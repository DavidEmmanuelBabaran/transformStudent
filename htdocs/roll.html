<!DOCTYPE html>
<html>
	<head>
		<title>Transition and Animation Exercises</title>
		<meta charset="UTF-8">
    	<meta name="description" content="Sample Code to implement transform and transition">
    <meta name="author" content="A.L. Mendoza & M.Tarcelo">
    <meta name="revised" content="12/04/2022">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<style>
      * {box-sizing: border-box}
			div{
				transition: all 0.5s;
			}
			
			#roll{
				width: 400px;
				height: 400px;
				margin: 30px auto;
				
			}
			#roll img{
				width: 100%;
        		height: 100%;
        		opacity: 0.75;
			
			}
      		#roll img:hover{
				opacity: 1;
				
				
			}
			#roll div{
				width: 200px;
				height: 200px;
			
			}
			#roll div:first-of-type{                
				background-color: red;                
				transform: translate(0px, -381px);                        
			}            #roll div:nth-of-type(2){                
				background-color: yellow;                
				transform: translate(200px, -581px);                                
			}            #roll div:nth-of-type(3){                
				background-color: blue;                
				transform: translate(0px, -581px);                        
			}            #roll div:last-of-type{                
				background-color: green;                 
				transform: translate(200px, -781px);                            
			}
			p {
				text-align: center;
			}
			#roll div:first-of-type:hover{
				transform: skewX(20deg);
			}
			#roll div:nth-of-type(2):hover {
				transform: skewX(20deg);
			}
			#roll div:nth-of-type(3):hover {
				transform: skewX(20deg);
			}
		    #roll div:last-of-type:hover {
				transform: skewX(20deg);
			}


		</style>
	</head>
	<body>
		<div id="roll">
			<p><a href="../index.html"> 
        <img src="../images/funny.jpg"/>
      </a>
      </p>
			<div></div>
			<div></div>
			<div></div>
			<div></div>
		</div>
    <p>Click on the Image for Home<br/>
    Source: https://www.ba-bamail.com/cute-overload/75-of-the-cutest-kittens-in-the-world/
    </p>
    
	</body>
</html>
